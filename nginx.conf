server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # URLs limpias: /consultar?id=... → consultar.html
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Redirección automática de "/" al final para evitar contenido duplicado (SEO y estética)
    # Si alguien escribe /privacy-policy/, Nginx lo limpia a /privacy-policy
    rewrite ^/(.*)/$ /$1 permanent;

    # Bloquear archivos ocultos
    location ~ /\. {
        deny all;
    }

    # Cache archivos estáticos
    location ~* \.(css|js|ico|png|jpg|webp|woff2)$ {
        expires 1M;
        add_header Cache-Control "public, immutable";
    }
}
